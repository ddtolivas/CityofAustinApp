<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalLens - Map</title>
    <link rel="stylesheet" href="styles.css?v=11">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="responsive.css?v=1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-search-location"></i>
                <span>LocalLens</span>
            </a>
            <div class="nav-items">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    Home
                </a>
                <a href="map.html" class="nav-item active">
                    <i class="fas fa-map"></i>
                    Map
                </a>
                <a href="add-business.html" class="nav-item">
                    <i class="fas fa-plus"></i>
                    Add Business
                </a>
                <div class="search-container">
                    <input type="text" placeholder="Search locations..." id="map-search">
                    <button type="button"><i class="fas fa-search"></i></button>
                </div>
                <a href="account.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    Account
                </a>
            </div>
        </div>
    </nav>
    <div class="main-content">
        <div class="map-controls">
            <button id="toggle-map" class="control-btn">
                <i class="fas fa-expand-alt"></i>
                Expand Map
            </button>
            <div class="filter-container">
                <button id="filter-btn" class="control-btn">
                    <i class="fas fa-filter"></i>
                    Filters
                </button>
                <div id="filter-dropdown" class="filter-dropdown">
                    <div class="filter-group">
                        <label>Location Type:</label>
                        <select id="source-filter">
                            <option value="">All</option>
                            <option value="food">Food</option>
                            <option value="hot-spots">Hot Spots</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Category:</label>
                        <select id="category-filter">
                            <option value="">All</option>
                            <option value="Food">Food</option>
                            <option value="Retail">Retail</option>
                            <option value="Services">Services</option>
                            <option value="Attractions">Attractions</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Rating:</label>
                        <select id="rating-filter">
                            <option value="">Any</option>
                            <option value="4">4+ Stars</option>
                            <option value="3">3+ Stars</option>
                            <option value="2">2+ Stars</option>
                        </select>
                    </div>
                    <button id="apply-filters" class="apply-btn">Apply Filters</button>
                </div>
            </div>
        </div>

        <div class="map-business-container">
            <div id="map-container" class="map-section">
                <div id="map">
                    <div class="map-placeholder">
                        <i class="fas fa-map-marked-alt"></i>
                        <p>Loading map...</p>
                        <p id="location-status">Loading spreadsheet locations...</p>
                    </div>
                </div>
            </div>

            <div class="business-list-section">
                <div class="business-list-header">
                    <h3>Local Locations</h3>
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="list" type="button" aria-label="List view">
                            <i class="fas fa-list"></i>
                        </button>
                        <button class="view-btn" data-view="grid" type="button" aria-label="Grid view">
                            <i class="fas fa-th"></i>
                        </button>
                    </div>
                </div>
                <div id="business-list" class="business-list">
                    <div class="sheet-empty-state">Loading locations from the spreadsheet...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="business-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-business-name">Location Name</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Location details load from the map list.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="sheet-map.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.view-btn').forEach(function (button) {
                button.addEventListener('click', function () {
                    var view = button.getAttribute('data-view');
                    document.querySelectorAll('.view-btn').forEach(function (candidate) {
                        candidate.classList.toggle('active', candidate === button);
                    });
                    document.getElementById('business-list')?.classList.toggle('grid-view', view === 'grid');
                });
            });
        });
    </script>
</body>
</html>
